<h1 mat-dialog-title>New version available</h1>
<div mat-dialog-content>A new version of this webapp is available. Would you like to reload the page?</div>
<div mat-dialog-actions>
  <button mat-button class="tlr-dialog-btn tlr-dialog-btn--ghost" mat-dialog-close>No</button>
  <button mat-button class="tlr-dialog-btn tlr-dialog-btn--primary" mat-dialog-close="true" cdkFocusInitial>Yes</button>
</div>
